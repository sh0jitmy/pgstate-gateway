extends: ["spectral:oas"]
rules:
  # 1. Path„ĀĮŤ§áśēįŚĹĘ (Paths should represent resource collections in plural form, with exceptions for versions, parameters, and special keywords like login/logout/auth/token)
  paths-plural:
    description: "Paths should represent resource collections in plural form."
    message: "Path segment in {{property}} is not plural. Should end with 's' or be a parameter/special keyword."
    severity: warn
    given: $.paths[*]~
    then:
      function: pattern
      functionOptions:
        match: "^\\/(v[0-9]+|login|logout|auth|token|me|[a-z0-9-]+s|\\{[a-zA-Z0-9_-]+\\})(\\/(login|logout|auth|token|me|[a-z0-9-]+s|\\{[a-zA-Z0-9_-]+\\}))*$"

  # 2. Path„ĀĮkebab-case
  paths-kebab-case:
    description: "Path segments must be kebab-case."
    message: "{{property}} is not kebab-case."
    severity: error
    given: $.paths[*]~
    then:
      function: pattern
      functionOptions:
        match: "^(\\/([a-z0-9-]+|\\{[a-zA-Z0-9_-]+\\}))+$"

  # 3. operationIdŚŅÖť†ą
  operation-operationId: error

  # 4. TagŚŅÖť†ą
  operation-tags: error

  # 5. descriptionŚŅÖť†ą
  operation-description: error
  info-description: error
  schema-description:
    description: "Schemas must have a description."
    severity: error
    given: $.components.schemas[*]
    then:
      field: description
      function: truthy

  # 6. examplesŚŅÖť†ą
  schema-property-example:
    description: "Schema properties must have an example."
    severity: warn
    given: $.components.schemas[*].properties[*]
    then:
      function: schema
      functionOptions:
        schema:
          anyOf:
            - required: [example]
            - required: [examples]
            - properties:
                type:
                  enum: [object, array]

  # 7. SecurityŚģöÁĺ©ŚŅÖť†ą
  security-defined:
    description: "Global security or components.securitySchemes must be defined."
    severity: error
    given: $
    then:
      function: schema
      functionOptions:
        schema:
          anyOf:
            - required: [security]
            - properties:
                components:
                  type: object
                  required: [securitySchemes]

  # 8. RFC7807„ā®„É©„ÉľŚĹĘŚľŹ (4xx, 5xx „Āģ„É¨„āĻ„ÉĚ„É≥„āĻ„ĀĮ RFC7807 (Problem Details) „ĀęŚĺď„ĀÜ„Āď„Ā®)
  rfc7807-error-response:
    description: "Error responses (4xx, 5xx) must follow RFC7807 (Problem Details)."
    severity: error
    given: $.paths[*][*].responses[?(@property >= 400 && @property < 600)].content['application/json'].schema
    then:
      function: schema
      functionOptions:
        schema:
          type: object
          required: [properties]
          properties:
            properties:
              type: object
              required: [type, title, status, detail]

  # 11. API„Éź„Éľ„āł„Éß„Éč„É≥„āį („ÉĎ„āĻ„ĀĆ /v[0-9]+ „ĀßŚßč„Āĺ„āč„Āď„Ā®)
  paths-versioning:
    description: "Paths must start with an API version (e.g. /v1)."
    severity: error
    given: $.paths[*]~
    then:
      function: pattern
      functionOptions:
        match: "^\\/v[0-9]+\\/"

  # 12. schemaŚĎĹŚźćŤ¶ŹŚČá (PascalCase)
  schema-names-pascal-case:
    description: "Schema names must be PascalCase."
    severity: error
    given: $.components.schemas[*]~
    then:
      function: pattern
      functionOptions:
        match: "^[A-Z][a-zA-Z0-9]+$"
