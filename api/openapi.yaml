openapi: 3.0.3
info:
  title: Secure Go Template API
  description: A secure and production-ready HTTP API server demonstrating slog masking, Bearer auth, and ent SQLite database.
  version: 1.0.0
  contact:
    name: API Support
    email: support@example.com
servers:
  - url: http://localhost:8080/v1
    description: Local development server
tags:
  - name: Authentication
    description: Authentication related endpoints.
  - name: Users
    description: User related endpoints.
paths:
  /v1/login:
    post:
      summary: User login
      description: Authenticate a user with username and password, returning a JWT token.
      operationId: login
      tags:
        - Authentication
      requestBody:
        description: User credentials for authentication
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Successfully authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '400':
          description: Invalid request payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '401':
          description: Authentication failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'

  /v1/users/me:
    get:
      summary: Get current authenticated user
      description: Retrieve profile information for the currently authenticated user session.
      operationId: getMe
      tags:
        - Users
      security:
        - BearerAuth: []
      responses:
        '200':
          description: User profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    LoginRequest:
      type: object
      description: The payload containing credentials to log in.
      required:
        - username
        - password
      properties:
        username:
          type: string
          description: The username of the user.
          example: admin
        password:
          type: string
          description: The user password.
          example: SuperSecretPassword123
    LoginResponse:
      type: object
      description: The response payload after a successful login.
      required:
        - token
      properties:
        token:
          type: string
          description: JWT token for Bearer authentication.
          example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
    User:
      type: object
      description: Represents a user profile in the system.
      required:
        - id
        - username
      properties:
        id:
          type: integer
          description: Unique identifier of the user.
          example: 42
        username:
          type: string
          description: The unique handle of the user.
          example: john_doe
    ProblemDetails:
      type: object
      description: A standard RFC7807 error representation.
      required:
        - type
        - title
        - status
        - detail
      properties:
        type:
          type: string
          description: A URI reference that identifies the problem type.
          example: https://example.com/errors/invalid-parameters
        title:
          type: string
          description: A short, human-readable summary of the problem type.
          example: Invalid Request Parameters
        status:
          type: integer
          description: The HTTP status code generated by the origin server.
          example: 400
        detail:
          type: string
          description: A human-readable explanation specific to this occurrence of the problem.
          example: The username field must not be empty.
