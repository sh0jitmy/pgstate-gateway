name: ✨ 機能要望 (Feature Request)
description: 新機能や改善の提案を行います。
title: "[FEATURE]: 短い要約"
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        新機能や改善のアイデアをお寄せください。

  - type: textarea
    id: summary
    attributes:
      label: 📝 提案の概要
      description: 追加したい機能や改善内容を簡潔に説明してください。
      placeholder: |
        OpenAPI スキーマに基づいたバリデーションミドルウェアの自動生成機能を追加したい。
    validations:
      required: true

  - type: textarea
    id: motivation
    attributes:
      label: 💡 動機・背景
      description: なぜこの機能が必要ですか？ どのような課題を解決しますか？
      placeholder: |
        現在、リクエストバリデーションを各ハンドラーで手動実装しており、
        OpenAPI スキーマとの乖離が発生しやすい。自動生成によりスキーマとの一貫性を保証したい。
    validations:
      required: true

  - type: checkboxes
    id: category
    attributes:
      label: 📦 影響範囲
      description: この提案が影響するカテゴリを選択してください。
      options:
        - label: "API / HTTP (internal/web)"
        - label: "データベース (ent / Atlas マイグレーション)"
        - label: "CLI (urfave/cli)"
        - label: "セキュリティ (認証 / TLS / ACME)"
        - label: "オブザーバビリティ (slog / OTel / Prometheus)"
        - label: "Terraform / IaC (さくらのクラウド)"
        - label: "CI / CD (GitHub Actions / GoReleaser / tagpr)"
        - label: "AI スキル (.claude/skills)"
        - label: "ドキュメント / テンプレート"

  - type: textarea
    id: alternatives
    attributes:
      label: 🔀 代替案の検討
      description: 他に検討した方法があれば記載してください。
      placeholder: |
        代替案1: oapi-codegen のバリデーション生成オプションを利用する。
        代替案2: go-playground/validator を手動で適用する。
    validations:
      required: false

  - type: textarea
    id: additional
    attributes:
      label: 📎 補足情報
      description: 参考資料、関連 Issue、スクリーンショットなどがあれば記載してください。
    validations:
      required: false
